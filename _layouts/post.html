---
layout: default
---

<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title }}</h1>

<p class="view">
{% for author in page.authors %}
    <div style="text-align: center; margin: 15px 0;">{{ author }}</div>
{% endfor %}
</p>

{% if page.pdf_url %}
<p style="text-align: center; margin: 20px 0;">
  <a href="{{ page.pdf_url | relative_url }}">Download PDF</a>
</p>
{% endif %}

<hr/>

{{content}}
